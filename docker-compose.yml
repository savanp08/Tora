services:
  redis:
    image: redis:alpine
    container_name: converse-redis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    command: redis-server --maxmemory 6gb --maxmemory-policy allkeys-lru --appendonly no
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      redis:
        condition: service_healthy
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:



