services:
  redis:
    image: redis:alpine
    container_name: converse-redis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    command: redis-server --maxmemory 8gb --maxmemory-policy allkeys-lru --appendonly no
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      PISTON_ENDPOINT: ${PISTON_ENDPOINT:-http://piston:2000/api/v2/execute}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      redis:
        condition: service_healthy
      piston:
        condition: service_started
  piston:
    image: ghcr.io/engineer-man/piston
    restart: unless-stopped
    ports:
      - "127.0.0.1:2000:2000"
    environment:
      PISTON_DISABLE_NETWORKING: "true"
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: "1.0"
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:



